<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spatial View — Gallery VR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    /* ─── Image Container ─── */
    .viewer {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .viewer img.zoomed {
      max-width: none;
      max-height: none;
      cursor: grab;
    }

    .viewer img.zoomed.dragging {
      cursor: grabbing;
      transition: none;
    }

    /* ─── Filename Overlay ─── */
    .filename-overlay {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.02em;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .filename-overlay.hidden {
      opacity: 0;
    }

    /* ─── Loading / Error ─── */
    .loading-state,
    .error-state {
      color: rgba(255, 255, 255, 0.5);
      font-size: 16px;
      text-align: center;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state svg {
      display: block;
      margin: 0 auto 12px;
      opacity: 0.4;
    }
  </style>
</head>

<body>
  <div class="viewer" id="viewer">
    <div class="loading-state" id="loading">
      <div class="loading-spinner"></div>
      <span>이미지 로딩 중...</span>
    </div>
  </div>
  <div class="filename-overlay" id="filename"></div>

  <script>
    (function () {
      'use strict';

      // ─── Parse URL params ───
      const params = new URLSearchParams(window.location.search);
      const filePath = params.get('path');
      const token = params.get('token');

      if (!filePath || !token) {
        showError('경로 또는 인증 정보가 누락되었습니다.');
        return;
      }

      // ─── Elements ───
      const viewer = document.getElementById('viewer');
      const filenameEl = document.getElementById('filename');
      const loadingEl = document.getElementById('loading');

      // Show filename
      const fileName = filePath.split('/').pop();
      filenameEl.textContent = fileName;
      document.title = `${fileName} — Spatial View`;

      // Auto-hide filename after 3 seconds
      let hideTimer = setTimeout(() => filenameEl.classList.add('hidden'), 3000);

      // Show filename briefly on tap
      viewer.addEventListener('pointerdown', () => {
        filenameEl.classList.remove('hidden');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => filenameEl.classList.add('hidden'), 3000);
      });

      // ─── Load Image ───
      const imgUrl = `/api/file?path=${encodeURIComponent(filePath)}&token=${encodeURIComponent(token)}`;
      const img = new Image();
      img.src = imgUrl;

      img.onload = () => {
        loadingEl.remove();
        viewer.appendChild(img);
        setupGestures(img);
      };

      img.onerror = () => {
        showError('이미지를 불러올 수 없습니다.');
      };

      // ─── Error Display ───
      function showError(message) {
        const el = document.getElementById('loading') || viewer;
        el.innerHTML = `
          <div class="error-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <p>${message}</p>
          </div>`;
      }

      // ─── Gesture System (Tap-to-Zoom + Pan) ───
      function setupGestures(imgEl) {
        let isZoomed = false;
        let scale = 1;
        let translateX = 0;
        let translateY = 0;

        // Drag state
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragBaseX = 0;
        let dragBaseY = 0;

        // Tap detection
        let tapStartTime = 0;
        let tapStartX = 0;
        let tapStartY = 0;
        const TAP_THRESHOLD = 15;
        const TAP_TIME = 300;

        viewer.addEventListener('pointerdown', (e) => {
          tapStartTime = Date.now();
          tapStartX = e.clientX;
          tapStartY = e.clientY;

          if (isZoomed) {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragBaseX = translateX;
            dragBaseY = translateY;
            imgEl.classList.add('dragging');
            e.preventDefault();
          }
        });

        viewer.addEventListener('pointermove', (e) => {
          if (!isDragging) return;
          e.preventDefault();
          translateX = dragBaseX + (e.clientX - dragStartX);
          translateY = dragBaseY + (e.clientY - dragStartY);
          applyTransform();
        });

        viewer.addEventListener('pointerup', (e) => {
          const elapsed = Date.now() - tapStartTime;
          const dx = Math.abs(e.clientX - tapStartX);
          const dy = Math.abs(e.clientY - tapStartY);

          if (isDragging) {
            isDragging = false;
            imgEl.classList.remove('dragging');
            return;
          }

          // Single tap → toggle zoom
          if (elapsed < TAP_TIME && dx < TAP_THRESHOLD && dy < TAP_THRESHOLD) {
            if (isZoomed) {
              // Zoom out
              isZoomed = false;
              scale = 1;
              translateX = 0;
              translateY = 0;
              imgEl.classList.remove('zoomed');
            } else {
              // Zoom in at tap position
              isZoomed = true;
              scale = 2;

              const rect = imgEl.getBoundingClientRect();
              const originX = e.clientX - (rect.left + rect.width / 2);
              const originY = e.clientY - (rect.top + rect.height / 2);
              translateX = -originX;
              translateY = -originY;

              imgEl.classList.add('zoomed');
            }
            applyTransform();
          }
        });

        viewer.addEventListener('pointercancel', () => {
          isDragging = false;
          imgEl.classList.remove('dragging');
        });

        function applyTransform() {
          imgEl.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }
      }
    })();
  </script>
</body>

</html>
